<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPAS 備考中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EEE2;
    --paper:#FBF9F1;
    --ink:#232F3B;
    --ink-soft:#5B6572;
    --line:#DCD5C2;
    --jade:#3F6B58;
    --jade-light:#E3ECE6;
    --amber:#B5791F;
    --amber-light:#F5E9D6;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;}
  .app{max-width:720px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;}
  .header{padding:20px 16px 12px;}
  h1{font-family:'Noto Serif TC',serif;font-weight:700;font-size:22px;margin:0 0 3px;}
  .sub{color:var(--ink-soft);font-size:12px;margin:0 0 14px;}
  .top-row{display:flex;gap:10px;}
  .stat-card{flex:1;min-width:120px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .stat-num{font-family:'Noto Serif TC',serif;font-weight:700;font-size:24px;line-height:1;}
  .stat-label{font-size:11px;color:var(--ink-soft);margin-top:5px;}
  .progress-bar-outer{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:8px;}
  .progress-bar-inner{height:100%;background:var(--jade);border-radius:4px;transition:width .3s;}

  .content{flex:1;padding:4px 16px 90px;}
  .view{display:none;}
  .view.active{display:block;}
  .view-title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;margin:8px 0 12px;}

  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--paper);border-top:1px solid var(--line);
    display:flex;max-width:720px;margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom, 0);
  }
  .nav-btn{
    flex:1;background:none;border:none;padding:10px 4px 8px;
    font-family:'Noto Sans TC',sans-serif;font-size:11px;color:var(--ink-soft);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .nav-btn .nav-dot{width:5px;height:5px;border-radius:50%;background:transparent;}
  .nav-btn.active{color:var(--jade);font-weight:700;}
  .nav-btn.active .nav-dot{background:var(--jade);}

  .tab-row{display:flex;gap:6px;margin-bottom:10px;}
  .tab-btn{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;color:var(--ink-soft);cursor:pointer;}
  .tab-btn.active{background:var(--jade);color:#fff;border-color:var(--jade);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  .res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .res-card{display:block;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;text-decoration:none;color:var(--ink);}
  .res-card .res-num{font-family:'Noto Serif TC',serif;font-weight:700;color:var(--jade);font-size:13px;}
  .res-card .res-name{font-size:13px;font-weight:500;margin-top:3px;line-height:1.3;}
  .res-files{margin-top:0;display:flex;flex-direction:column;gap:8px;}
  .res-file-link{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 14px;text-decoration:none;color:var(--ink);font-size:13px;}
  .res-file-link span.arrow{color:var(--ink-soft);}

  .month-block{margin-bottom:18px;}
  .month-title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;margin:0 0 8px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-wd{text-align:center;font-size:11px;color:var(--ink-soft);padding:2px 0;}
  .cal-day{aspect-ratio:1;border-radius:8px;background:var(--paper);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:default;position:relative;}
  .cal-day.empty{background:transparent;border:none;}
  .cal-day.has-task{cursor:pointer;}
  .cal-day.has-task:active{background:var(--jade-light);}
  .cal-day.is-today{border:2px solid var(--amber);}
  .cal-day.is-selected{background:var(--jade-light);border-color:var(--jade);}
  .cal-day .dnum{font-weight:500;}
  .cal-day .dot{width:5px;height:5px;border-radius:50%;margin-top:2px;background:var(--line);}
  .cal-day.done .dot{background:var(--jade);}
  .cal-day.pending .dot{background:var(--amber);}
  .cal-day.no-task .dnum{color:var(--ink-soft);opacity:.4;}

  .day-card{position:relative;background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--amber);border-radius:10px;padding:18px 20px 16px;}
  .day-tab{position:absolute;top:-10px;left:18px;background:var(--amber);color:#fff;font-size:12px;font-weight:500;padding:3px 12px;border-radius:0 0 6px 6px;}
  .day-title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:17px;margin:10px 0 2px;}
  .day-week{color:var(--ink-soft);font-size:13px;margin-bottom:12px;}
  .task{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:14px;}
  .task input{margin-top:3px;width:17px;height:17px;accent-color:var(--jade);cursor:pointer;flex-shrink:0;}
  .task .task-main{flex:1;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .task label{cursor:pointer;line-height:1.5;}
  .task.done label{color:var(--ink-soft);text-decoration:line-through;}
  .task a.res-link{font-size:12px;color:var(--jade);text-decoration:none;border-bottom:1px solid var(--jade-light);white-space:nowrap;}

  details{background:var(--paper);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;padding:0;}
  summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;font-family:'Noto Serif TC',serif;font-weight:500;font-size:15px;gap:8px;}
  summary::-webkit-details-marker{display:none;}
  summary .arrow{transition:transform .2s;color:var(--ink-soft);font-size:13px;}
  details[open] summary .arrow{transform:rotate(90deg);}
  .week-meta{font-size:12px;color:var(--ink-soft);font-weight:400;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
  .week-body{padding:4px 18px 16px;}
  .week-body .task{border-bottom:1px dashed var(--line);}
  .week-body .task:last-child{border-bottom:none;}
  .badge{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--jade-light);color:var(--jade);font-weight:500;}
  .badge.current{background:var(--amber-light);color:var(--amber);}

  .quiz-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .quiz-stat-pill{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--ink-soft);}
  .quiz-stat-pill b{color:var(--ink);font-family:'Noto Serif TC',serif;}
  .quiz-box{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:12px;}
  .quiz-meta{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
  .quiz-stem{font-size:14px;line-height:1.7;margin-bottom:14px;white-space:pre-wrap;}
  .quiz-opt{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px;line-height:1.6;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--ink);}
  .quiz-opt:disabled{cursor:default;}
  .quiz-opt.correct{background:var(--jade-light);border-color:var(--jade);color:var(--jade);font-weight:500;}
  .quiz-opt.wrong{background:#F7E3DE;border-color:#B5541F;color:#B5541F;font-weight:500;}
  .quiz-feedback{font-size:13px;font-weight:500;margin-top:6px;}
  .quiz-feedback.ok{color:var(--jade);}
  .quiz-feedback.no{color:#B5541F;}
  .quiz-next-btn{background:var(--jade);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}

  @media (max-width:420px){h1{font-size:20px;} .stat-num{font-size:21px;} .cal-day{font-size:11px;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>iPAS AI應用規劃師 備考中心</h1>
    <p class="sub">初級 · 科目一 人工智慧基礎概論 ／ 科目二 生成式AI應用與規劃</p>

      <div class="tab-panel" id="res-files">
        <div class="res-files">
          <a class="res-file-link" target="_blank" rel="noopener" href="https://docs.google.com/spreadsheets/d/1un6Cfa8FC61y-07qHD7e_sqqnHj_5Zcl/edit"><span>進度追蹤／錯題本／記憶卡（Sheets）</span><span class="arrow">›</span></a>

    <div class="view" id="view-weeks" data-view="view-weeks">
      <div class="view-title">六週讀書計畫（清單檢視）</div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="view-today"><span class="nav-dot"></span>今天</button>

// ---------- day tracker ----------
function dkey(y,m,d){return y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function toDate(y,m,d){return new Date(y,m-1,d);}
function todayMidnight(){const d=new Date();d.setHours(0,0,0,0);return d;}

const planByDate = {};
DAILY_PLAN.forEach(p=>{ planByDate[dkey(p.y,p.m,p.d)] = p; });

let state = {};
let selectedKey = null;

function loadTrackerState(){
  try{
    const raw = localStorage.getItem('ipas-tracker-state-v2');
    if(raw) state = JSON.parse(raw);
  }catch(e){ state = {}; }
}
function saveTrackerState(){
  try{ localStorage.setItem('ipas-tracker-state-v2', JSON.stringify(state)); }catch(e){}
}

let currentCalMonth = 7;

function buildMonthGrid(year, month, title){
  const first = new Date(year, month-1, 1);
  const daysInMonth = new Date(year, month, 0).getDate();
  const leading = first.getDay();
  const block = document.createElement('div');
  block.className='month-block';
  const h = document.createElement('div');
  h.className='month-title';
  h.textContent = title;
  block.appendChild(h);
  const grid = document.createElement('div');
  grid.className='cal-grid';
  WD_LABEL.forEach(w=>{
    const el = document.createElement('div');
    el.className='cal-wd'; el.textContent=w;
    grid.appendChild(el);
  });
  for(let i=0;i<leading;i++){
    const el = document.createElement('div');
    el.className='cal-day empty';
    grid.appendChild(el);
  }
  const today = todayMidnight();
  for(let d=1; d<=daysInMonth; d++){
    const key = dkey(year,month,d);
    const plan = planByDate[key];
    const cell = document.createElement('div');
    cell.className='cal-day';
    const num = document.createElement('div');
    num.className='dnum';
    num.textContent = d;
    cell.appendChild(num);
    if(plan){
      cell.classList.add('has-task');
      const dot = document.createElement('div');
      dot.className='dot';
      cell.appendChild(dot);
      if(state[key]) cell.classList.add('done'); else cell.classList.add('pending');
      cell.addEventListener('click', ()=>{ selectedKey = key; renderDayPanel(); renderWeeks(); switchView('view-today'); });
    } else {
      cell.classList.add('no-task');
    }
    const cellDate = toDate(year,month,d);
    if(cellDate.getTime() === today.getTime()) cell.classList.add('is-today');
    if(key === selectedKey) cell.classList.add('is-selected');
    grid.appendChild(cell);
  }
  block.appendChild(grid);
  return block;
}

function renderCalendars(){
  const container = document.getElementById('calendars');
  container.innerHTML='';
  container.appendChild(buildMonthGrid(2026, currentCalMonth, currentCalMonth===7?'2026年 7月':'2026年 8月'));
}

function makeTaskRow(key, plan){
  const row = document.createElement('div');
  row.className = 'task'+(state[key]?' done':'');
  const cb = document.createElement('input');
  cb.type='checkbox';
  cb.checked = !!state[key];
  cb.id='cb-'+key;
  cb.addEventListener('change', ()=>{
    state[key] = cb.checked;
    saveTrackerState();
    renderAll();
  });
  const main = document.createElement('div');
  main.className='task-main';
  const label = document.createElement('label');
  label.htmlFor='cb-'+key;
  label.textContent = plan.text;
  main.appendChild(label);
  if(plan.link){
    const a = document.createElement('a');
    a.href=plan.link; a.target='_blank'; a.rel='noopener'; a.className='res-link';
    a.textContent='開啟資料 ›';
    main.appendChild(a);
  }
  row.appendChild(cb);
  row.appendChild(main);
  return row;
}

function renderDayPanel(){
  const panel = document.getElementById('day-panel');
  panel.innerHTML='';
  const plan = planByDate[selectedKey];
  if(!plan) return;
  const today = todayMidnight();
  const [yy,mm,dd] = selectedKey.split('-').map(Number);
  const isToday = toDate(yy,mm,dd).getTime() === today.getTime();

  const card = document.createElement('div');
  card.className='day-card';
  const tab = document.createElement('div');
  tab.className='day-tab';
  tab.textContent = isToday ? '今天' : (mm+'/'+dd+'（'+WD_LABEL[toDate(yy,mm,dd).getDay()]+'）');
  card.appendChild(tab);
  const title = document.createElement('div');
  title.className='day-title';
  title.textContent = mm+'月'+dd+'日';
  card.appendChild(title);
  const week = document.createElement('div');
  week.className='day-week';
  week.textContent = plan.wtitle;
  card.appendChild(week);
  card.appendChild(makeTaskRow(selectedKey, plan));
  panel.appendChild(card);
}

function renderWeeks(){
  const weeksEl = document.getElementById('weeks');
  weeksEl.innerHTML='';
  const weekOrder = ['w1','w2','w3','w4','w5','w6','exam'];
  weekOrder.forEach(wid=>{
    const days = DAILY_PLAN.filter(p=>p.wid===wid);
    if(!days.length) return;
    const wtitle = days[0].wtitle;
    const doneCount = days.filter(p=>state[dkey(p.y,p.m,p.d)]).length;
    const containsSelected = days.some(p=>dkey(p.y,p.m,p.d)===selectedKey);
    const det = document.createElement('details');
    if(containsSelected) det.open = true;
    const summary = document.createElement('summary');
    const rangeLabel = days[0].m+'/'+days[0].d+' – '+days[days.length-1].m+'/'+days[days.length-1].d;
    summary.innerHTML = '<span>'+wtitle+'</span><span class="week-meta">'+rangeLabel+' &nbsp; <span class="badge'+(containsSelected?' current':'')+'">'+doneCount+'/'+days.length+'</span> <span class="arrow">›</span></span>';
    det.appendChild(summary);
    const body = document.createElement('div');
    body.className='week-body';
    days.forEach(p=>{
      const key = dkey(p.y,p.m,p.d);
      const row = makeTaskRow(key, p);
      const dlabel = document.createElement('span');
      dlabel.style.cssText='font-size:11px;color:var(--ink-soft);min-width:34px;';
      dlabel.textContent = p.m+'/'+p.d;
      row.insertBefore(dlabel, row.firstChild);
      body.appendChild(row);
    });
    det.appendChild(body);
    weeksEl.appendChild(det);
  });
}

function renderStats(){
  const today = todayMidnight();
  const examDate = toDate(2026,8,15);
  const daysLeft = Math.round((examDate - today)/86400000);
  document.getElementById('countdown').textContent = daysLeft >= 0 ? daysLeft : 0;

  const total = DAILY_PLAN.length;
  const done = DAILY_PLAN.filter(p=>state[dkey(p.y,p.m,p.d)]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-bar').style.width = pct+'%';
}

function renderAll(){
  renderStats();
  renderCalendars();
  renderDayPanel();
  renderWeeks();
  renderQuizStats();
}

const QUESTIONS = [
  {id:'s2-1-1', subject:'科目一', source:'115年第二次·科目一', num:1, stem:'某地方政府委託資料科學團隊，針對選舉期間的社群媒體貼文進行大規模輿情分析，目標是了解選民對各政策議題的態度傾向。團隊規劃整合多種 AI 技術以提升分析涵蓋率。下列哪一種技術組合最符合上述需求，且不涉及對特定個人的身份辨識？', options:{A:'情感分析結合關鍵詞提取，分析貼文內容的立場與高頻議題詞彙',B:'文本分類結合人臉辨識，辨識發文者身份後再進行政治立場分類',C:'語音辨識結合影像辨識，將選舉造勢影片轉換為可分析的文字資料，並進行內容整理與主題歸納',D:'推薦系統結合社群圖譜分析，針對個別使用者預測其投票選擇'}, answer:'A'},
  {id:'s2-1-2', subject:'科目一', source:'115年第二次·科目一', num:2, stem:'某物流公司正在規劃導入 AI 系統以優化多項業務流程，包含異常包裹偵測、路線自動規劃與倉儲揀貨效率提升。請問下列對於各學習方式的敘述，何者有誤？', options:{A:'監督式學習適合用於異常包裹偵測，前提是須備有大量已標註為正常或異常的歷史資料',B:'非監督式學習可用於分析倉儲揀貨動線的潛在分群，但無法直接預測特定行為的對錯',C:'強化學習適合應用於路線規劃，模型透過反覆嘗試與環境回饋，逐步找出最佳配送策略',D:'非監督式學習可用於異常包裹偵測，並能在缺乏標註資料的情況下，準確判斷每筆資料是否屬於特定異常類別'}, answer:'D'},
  {id:'s2-1-3', subject:'科目一', source:'115年第二次·科目一', num:3, stem:'某電子製造公司在產線上導入 AI 系統，自動判斷電路板是否存在焊接瑕疵，並取代人工目視檢查。下列何者最不符合此應用所展現的 AI 核心技術能力？', options:{A:'自然語言處理（Natural Language Processing）',B:'電腦視覺（Computer Vision）',C:'異常偵測（Anomaly Detection）',D:'診斷性分析（Diagnostic Analytics）'}, answer:'A'},
  {id:'s2-1-4', subject:'科目一', source:'115年第二次·科目一', num:4, stem:'某金融科技公司的交易系統，在毫秒等級的時間內持續掃描跨市場價格差異、分析大量即時報價，並自動執行交易指令。下列何者最能正確說明其核心 AI 能力？', options:{A:'透過自然語言處理技術分析財經新聞語意，作為輔助性市場情緒指標',B:'快速分析龐大市場數據並在極短時間內識別交易機會，驅動自動化交易決策',C:'運用生成對抗網路模擬極端市場情境，預先產出各類黑天鵝事件的應對策略',D:'透過推薦系統技術，根據投資人歷史交易行為推薦最適合的投資組合標的'}, answer:'B'},
  {id:'s2-1-5', subject:'科目一', source:'115年第二次·科目一', num:5, stem:'某地方政府導入 AI 系統審核低收入補助資格。系統已通過內部測試且準確率高，但民間團體指出不同族群核准率差異顯著。依《人工智慧基本法》精神，下列何者為最適當之優先作法？', options:{A:'要求廠商提出無歧視聲明，並持續觀察',B:'提升模型整體準確率，以降低錯誤影響',C:'進行偏誤影響評估並建立可解釋與申訴機制',D:'因尚無大量申訴，暫不調整現行制度'}, answer:'C'},
  {id:'s2-1-6', subject:'科目一', source:'115年第二次·科目一', num:6, stem:'某 AI 新創公司申請 AI 系統認證，並聲稱其產品已通過我國「AI 產品與系統評測中心」之生成式 AI 評測。下列何者不屬於該中心之評測項目？', options:{A:'資安（Secure）',B:'公平性（Fair）',C:'效率性（Efficiency）',D:'可靠性（Reliability）'}, answer:'C'},
  {id:'s2-1-7', subject:'科目一', source:'115年第二次·科目一', num:7, stem:'某媒體集團計畫自行訓練一套生成式 AI 系統，用於自動產出新聞摘要與評論內容。請問下列哪一項措施最應該在模型訓練階段優先落實，以降低有害或偏頗內容的風險？', options:{A:'確保訓練資料來源多元，並經過嚴格的內容清洗與偏見過濾，以減少模型學習到有害或偏頗資訊的風險',B:'完全避免使用任何外部文本資料，以降低模型學習到不當內容的可能性',C:'僅使用公司內部的新聞稿與公告進行訓練，確保資料來源可控且符合企業立場',D:'限制模型僅能產出固定格式的內容，從輸出端約束模型避免生成不當資訊'}, answer:'A'},
  {id:'s2-1-8', subject:'科目一', source:'115年第二次·科目一', num:8, stem:'某保險公司規劃推出一套 AI 核保輔助系統。依據金融機構運用人工智慧技術作業規範，下列何者不屬於該規範要求金融機構必要揭露的事項？', options:{A:'詳細公開本系統所採用的機器學習模型架構與完整訓練資料內容',B:'說明本服務的適用對象與用途範圍，使消費者了解系統的使用限制與服務邊界',C:'說明當消費者對 AI 核保結果有異議時，是否提供人工複核或申訴管道',D:'告知消費者本次核保審查結果係由 AI 系統自動完成，非人工逐案審核'}, answer:'A'},
  {id:'s2-1-9', subject:'科目一', source:'115年第二次·科目一', num:9, stem:'某大型醫院導入 AI 輔助診斷系統，院方陸續收到三類回饋：①放射科醫師反映無法理解系統判斷依據；②委員會發現系統對特定族裔病患誤診率顯著偏高；③資安部門指出病患個資在未告知情況下被納入模型再訓練。依據 AI 倫理五大核心原則，上述三類問題分別對應哪一項原則的違反？', options:{A:'①違反安全性、②違反問責性、③違反透明性',B:'①違反隱私性、②違反安全性、③違反公平性',C:'①違反公平性、②違反透明性、③違反問責性',D:'①違反透明性、②違反公平性、③違反隱私性'}, answer:'D'},
  {id:'s2-1-10', subject:'科目一', source:'115年第二次·科目一', num:10, stem:'某市政府環保局計畫建立空氣品質監測 AI 系統，需整合全市 5 萬個感測器的即時數據，並持續接收氣象、交通與工廠排放等資料。就大數據特性分析，下列何者最能說明此專案面臨的主要挑戰組合？', options:{A:'Volume 與 Velocity，因為資料量龐大且持續高速產生',B:'Variety 與 Veracity，因為資料來源多元且需確保正確性',C:'Velocity 與 Value，因為需即時判斷資料是否具有分析價值',D:'Volume 與 Value，因為需從大量資料中篩選出有用資訊'}, answer:'A'},
  {id:'s2-1-11', subject:'科目一', source:'115年第二次·科目一', num:11, stem:'某保險公司建立理賠風險預測模型時，資料科學家提出以「性別」作為預測愛滋病毒感染風險的輸入特徵之一。下列哪一項理由最能說明此作法不適當？', options:{A:'性別為類別型變數，需進行編碼轉換才能輸入模型，增加前處理複雜度',B:'性別特徵在資料集中可能存在缺失值，影響模型訓練的穩定性',C:'以性別作為感染風險的代理特徵，會強化對特定族群的歧視性標籤，違反公平性原則',D:'性別特徵與感染風險之間的統計相關性有限，可能降低模型預測效能'}, answer:'C'},
  {id:'s2-1-12', subject:'科目一', source:'115年第二次·科目一', num:12, stem:'某製造業導入 AI 進行生產排程，需整合 ERP 訂單資料、設備感測器產生的連續數值紀錄，以及維修技師手寫異常描述（掃描為 PDF）。下列何者最能正確對應其資料型態？', options:{A:'ERP 訂單資料為半結構化、感測器數值為結構化、維修文字描述為非結構化',B:'ERP 訂單資料為結構化、感測器數值為結構化、維修文字描述為非結構化',C:'ERP 訂單資料為結構化、感測器數值為非結構化、維修文字描述為半結構化',D:'三者皆屬結構化資料，因為都可以轉換為數值格式後進行分析'}, answer:'B'},
  {id:'s2-1-13', subject:'科目一', source:'115年第二次·科目一', num:13, stem:'某銀行建立機器學習模型預測客戶的貸款違約風險。「職業類別」欄位包含「工程師、教師、業務、自由業」等類別，計畫直接輸入線性模型。下列哪一種編碼方式最可能導致模型錯誤解讀類別之間的關係？', options:{A:'One-Hot Encoding',B:'Binary Encoding',C:'Target Encoding',D:'Label Encoding'}, answer:'D'},
  {id:'s2-1-14', subject:'科目一', source:'115年第二次·科目一', num:14, stem:'某能源公司以過去三年每小時用電資料建立需求預測模型，並以 5-fold 交叉驗證評估，但上線後誤差偏高。下列何者最能說明使用標準 k-fold 交叉驗證的根本問題？', options:{A:'k-fold 交叉驗證需要的計算資源過大，不適合處理三年以上的長期資料',B:'k-fold 交叉驗證會隨機分割資料，使訓練集中可能包含比測試集更晚的時間點，破壞時間依賴性',C:'k-fold 交叉驗證的折數設定過少，應改為 10-fold 以提升驗證穩定性',D:'k-fold 交叉驗證僅適用於分類問題，不適合電力需求這類連續數值預測任務'}, answer:'B'},
  {id:'s2-1-15', subject:'科目一', source:'115年第二次·科目一', num:15, stem:'某醫療院所建置病患再住院風險預測模型，特徵包含「年齡」、「體重」、「血壓數值」及「診斷類別代碼」。下列何種模型對特徵尺度最不敏感、最適合在不進行標準化的情況下直接使用上述特徵進行訓練？', options:{A:'線性迴歸（Linear Regression）',B:'支援向量機（Support Vector Machine）',C:'K 近鄰演算法（K-Nearest Neighbors）',D:'決策樹（Decision Tree）'}, answer:'D'},
  {id:'s2-1-16', subject:'科目一', source:'115年第二次·科目一', num:16, stem:'某企業集團在多個領域導入 AI 技術。請問下列哪一項最符合異常檢測（Anomaly Detection）的主要應用目標？', options:{A:'分析客戶的消費行為資料，將客群依偏好進行分群，以制定差異化行銷策略',B:'根據歷史交易與客戶資料，建立模型預測未來可能發生違約的客戶',C:'彙整企業各部門的營運數據，建立儀表板供管理層追蹤關鍵績效指標的變化',D:'從設備感測資料中，即時偵測出與正常運作模式顯著偏離的訊號，以預警可能發生的故障'}, answer:'D'},
  {id:'s2-1-17', subject:'科目一', source:'115年第二次·科目一', num:17, stem:'某交通局計劃將公車乘客刷卡資料提供給學術機構進行通勤模式研究，該資料包含卡號、上下車時間、路線編號等欄位，且需保留跨時間追蹤同一乘客行為能力。下列哪種處理方式最符合個人資料保護法的去識別化要求？', options:{A:'將卡號欄位全部刪除，僅保留上下車時間與路線編號',B:'對卡號進行 MD5 雜湊處理，並保留對照表供查詢',C:'將資料彙總為每日各路線總乘客數統計',D:'將卡號替換為隨機編號，且不保留任何對應關係'}, answer:'D'},
  {id:'s2-2-1', subject:'科目二', source:'115年第二次·科目二', num:1, stem:'一家會計師事務所希望透過 Low-Code 工具，自動處理客戶提交的各類費用報銷單據，格式涵蓋手寫、PDF 掃描、電子發票等多種形式。方案甲為「直接呼叫基礎語言模型 API 進行單據內容解析與分類」，方案乙為「使用內建 RAG 元件，比對過去已正確分類的報銷單據」。下列分析何者最為正確？', options:{A:'方案甲優於方案乙，因為基礎語言模型具備更廣泛的通用知識，足以應對所有格式變化',B:'方案乙優於方案甲，因為 RAG 能提供歷史分類案例作為參考上下文，顯著提升非結構化文件的分類準確率',C:'兩者效果相同，差異僅在於系統複雜度，應優先選擇建置較簡單的方案甲',D:'可透過預先設定固定分類規則的方式處理報銷單據，以提升處理效率並降低系統複雜度'}, answer:'B'},
  {id:'s2-2-2', subject:'科目二', source:'115年第二次·科目二', num:2, stem:'某客服主管希望在 Low-Code 平台中設定自動化流程：當客戶訊息被 AI 判定為「退費意圖」，且退費金額大於 10,000 元時，即自動發送緊急通知給主管。此需求最可能透過下列哪一種元件實現？', options:{A:'條件分支（Branching / Router），依據多重條件判斷流程走向',B:'資料格式化（Formatter），用於整理與轉換流程中的資料格式',C:'迭代／迴圈（Iterator），逐筆處理多筆資料並依序執行流程',D:'陣列聚合器（Array Aggregator），將多筆資料整合後再進行後續處理'}, answer:'A'},
  {id:'s2-2-3', subject:'科目二', source:'115年第二次·科目二', num:3, stem:'某人資部門使用 Dify 平台建立了一個 AI 面試輔助機器人。測試時發現，機器人完全無法記住同一位應徵者在五分鐘前說過的話，每次回應都像是全新對話。以下哪個措施能從根本上解決此問題？', options:{A:'提升語言模型的溫度參數（Temperature）',B:'在每次 API 請求中，手動將歷史對話內容一併打包送入模型進行推理',C:'改用具備更多參數的大型多模態模型，以強化跨輪對話的理解能力',D:'為伺服器增加記憶體容量，擴充系統可儲存的對話快取空間'}, answer:'B'},
  {id:'s2-2-4', subject:'科目二', source:'115年第二次·科目二', num:4, stem:'在使用 API 串接生成式 AI 服務時，Token 會影響模型的計費。請問下列何者最正確敘述 Token 在 LLM 應用中的意義？', options:{A:'Token 是模型將文字切分後的基本單位，通常與字詞或子詞對應，文件長度與 Token 數量具有一定關聯性',B:'Token 是模型用來表示整段文字語意的向量單位，用於理解輸入內容的語意結構',C:'Token 的數量會影響模型的輸入輸出長度與計費，而上下文長度受限於模型可處理的最大 Token 數量',D:'Token 只影響模型的運算速度，不影響 API 的使用成本'}, answer:'C'},
  {id:'s2-2-5', subject:'科目二', source:'115年第二次·科目二', num:5, stem:'一家連鎖零售業者使用某封閉式 No-Code 平台多年，該平台資料採專有格式儲存，匯出功能有限，且未提供標準 API 支援。長期而言，該企業最可能面臨下列何種風險？', options:{A:'員工需具備撰寫進階程式語法的能力，才能持續使用該平台進行系統操作',B:'隨著系統使用時間增加，平台運算效能將逐漸下降，影響營運效率',C:'系統運作過程中較容易發生資安漏洞，導致資料外洩風險提高',D:'企業在未來更換系統時，將因資料與功能難以轉移而高度依賴原平台'}, answer:'D'},
  {id:'s2-2-6', subject:'科目二', source:'115年第二次·科目二', num:6, stem:'某物流公司評估導入 No-Code／Low-Code 平台，希望能與現有的 ERP 系統、倉儲管理系統及客戶通知平台進行資料串接。若主要考量系統整合能力，下列哪一項平台特性最能滿足此整合需求？', options:{A:'平台是否提供強制將所有應用程式部署於地端伺服器的選項，以確保資料不外流',B:'平台是否具備豐富的 API 介接能力、Webhooks 機制與開放式架構，能順暢串接既有系統',C:'平台是否內建將圖形化流程還原為原始程式碼的編譯工具，以便未來自行維護',D:'平台是否採用封閉式架構設計，以降低外部系統整合所帶來的安全風險'}, answer:'B'},
  {id:'s2-2-7', subject:'科目二', source:'115年第二次·科目二', num:7, stem:'某企業導入 No-Code／Low-Code 平台後，發現各部門可快速開發 AI 應用，但同時產生大量重複功能之應用程式，且模型使用方式不一致，導致治理困難。若企業希望在維持「AI 民主化」前提下改善此問題，下列何者最適當之作法？', options:{A:'全面禁止業務單位自行開發 AI 應用，統一由資訊部門負責',B:'建立應用開發與模型使用之治理規範與共用標準',C:'停止使用 No-Code／Low-Code 工具，改採傳統開發模式',D:'限制 AI 應用僅能用於單一部門內部使用'}, answer:'B'},

  {id:'s2-2-11', subject:'科目二', source:'115年第二次·科目二', num:11, stem:'某中小企業行銷部門主管希望在不需高度依賴 IT 支援的情況下，快速建立一套能自動分析顧客問卷回饋並進行情緒分類的系統。下列何者最能說明 AutoML 在此情境下的核心優勢？', options:{A:'AutoML 仍需使用者熟悉 Python 與深度學習框架，否則無法進行模型訓練',B:'AutoML 可自動完成模型選擇、特徵處理與訓練流程，使非技術背景人員也能快速建立並上線模型',C:'AutoML 僅適用於文字情緒分析，若應用於其他預測任務需重新開發系統',D:'AutoML 產出的模型無法直接應用於實務場景，仍需完全重寫程式才能使用'}, answer:'B'},
  {id:'s2-2-12', subject:'科目二', source:'115年第二次·科目二', num:12, stem:'某電商平台導入 CLIP（Contrastive Language-Image Pre-training）模型，讓使用者能直接輸入文字描述來搜尋商品圖片。請問 CLIP 模型是透過哪一種方式來衡量文字描述與圖片之間的相符程度？', options:{A:'餘弦相似度（Cosine Similarity），計算文字與圖片在向量空間中的方向相似程度',B:'BLEU 分數，衡量文字描述與圖片標題之間的詞彙重疊程度',C:'交叉熵損失（Cross-Entropy Loss），用於衡量模型預測機率與實際標籤之間的差異',D:'F1 分數（F1 Score），綜合評估搜尋結果的精確率與召回率'}, answer:'A'},
  {id:'s2-2-13', subject:'科目二', source:'115年第二次·科目二', num:13, stem:'某新創公司正在評估開發方式，希望讓非技術背景的業務同仁也能參與功能原型的快速開發，團隊討論採用 Vibe Coding 與 Low-Code 兩種方式。請問下列哪一項對於 Vibe Coding 與 Low-Code 的敘述最為正確？', options:{A:'兩者本質相同，差異僅在於 Vibe Coding 以對話介面取代視覺化拖拉操作，最終產出的程式碼品質與可維護性並無顯著差異',B:'Vibe Coding 需要開發者具備一定的程式語言基礎才能有效審閱 AI 產出的程式碼，因此與 Low-Code 平台相比，不適合非技術人員使用',C:'Low-Code 平台因具備完整的視覺化與流程控制，較適合開發穩定且可維護的系統；Vibe Coding 則較適用於快速原型開發，難以支援結構複雜的正式應用系統',D:'Vibe Coding 透過自然語言驅動 AI 生成客製化程式碼，彈性較高但產出品質高度依賴提示詞的描述精準度；Low-Code 平台則透過預設元件組合快速建構，上限受限於平台本身支援的功能範疇'}, answer:'D'},

let quizState = {};
let currentSubjectFilter = 'all';
let currentQ = null;

function quizFilteredList(){
  return currentSubjectFilter==='all' ? QUESTIONS : QUESTIONS.filter(q=>q.subject===currentSubjectFilter);
}
function pickNextQuestion(){
  const list = quizFilteredList();
  const weighted = [];
  list.forEach(q=>{
    const st = quizState[q.id] || {attempts:0, correct:0, lastResult:null};
    let weight = 1;
    if(st.attempts===0) weight = 4;
    else if(st.lastResult===false) weight = 3;
    else weight = 1;
    for(let i=0;i<weight;i++) weighted.push(q);
  });
  return weighted[Math.floor(Math.random()*weighted.length)];
}
function loadQuizState(){
  try{
    const raw = localStorage.getItem('ipas-quiz-state-v1');
    if(raw) quizState = JSON.parse(raw);
  }catch(e){ quizState = {}; }
}
function saveQuizState(){
  try{ localStorage.setItem('ipas-quiz-state-v1', JSON.stringify(quizState)); }catch(e){}
}
function renderQuizStats(){
  const list = quizFilteredList();
  let mastered=0, weak=0, unseen=0;
  list.forEach(q=>{
    const st = quizState[q.id];
    if(!st || st.attempts===0) unseen++;
    else if(st.lastResult===true) mastered++;
    else weak++;
  });
  const el = document.getElementById('quiz-stats');
  el.innerHTML =
    '<span class="quiz-stat-pill">總題數 <b>'+list.length+'</b></span>'+
    '<span class="quiz-stat-pill">熟練 <b>'+mastered+'</b></span>'+
    '<span class="quiz-stat-pill">待加強 <b>'+weak+'</b></span>'+
    '<span class="quiz-stat-pill">未作答 <b>'+unseen+'</b></span>';
}
function renderQuizCard(){
  const card = document.getElementById('quiz-card');
  card.innerHTML='';
  if(!currentQ) currentQ = pickNextQuestion();
  if(!currentQ){ card.innerHTML = '<div class="quiz-box">這個科目目前沒有題目。</div>'; return; }
  const q = currentQ;
  const box = document.createElement('div');
  box.className='quiz-box';
  const meta = document.createElement('div');
  meta.className='quiz-meta';
  meta.textContent = q.source+' 第'+q.num+'題';
  box.appendChild(meta);
  const stem = document.createElement('div');
  stem.className='quiz-stem';
  stem.textContent = q.stem;
  box.appendChild(stem);
  ['A','B','C','D'].forEach(letter=>{
    const btn = document.createElement('button');
    btn.className='quiz-opt';
    btn.dataset.letter = letter;
    btn.textContent = '('+letter+') '+q.options[letter];
    btn.addEventListener('click', ()=>answerQuestion(letter));
    box.appendChild(btn);
  });
  const fb = document.createElement('div');
  fb.className='quiz-feedback';
  fb.id='quiz-feedback';
  box.appendChild(fb);
  card.appendChild(box);
}
function answerQuestion(letter){
  const q = currentQ;
  const correct = (letter === q.answer);
  const st = quizState[q.id] || {attempts:0, correct:0, lastResult:null};
  st.attempts++;
  if(correct) st.correct++;
  st.lastResult = correct;
  quizState[q.id] = st;
  saveQuizState();

  document.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.disabled = true;
    const optLetter = btn.dataset.letter;
    if(optLetter === q.answer) btn.classList.add('correct');
    else if(optLetter === letter) btn.classList.add('wrong');
  });
  const fb = document.getElementById('quiz-feedback');
  fb.textContent = correct ? '答對了！' : ('答錯了，正確答案是 ('+q.answer+')');
  fb.className = 'quiz-feedback ' + (correct?'ok':'no');
  renderQuizStats();
}
function nextQuestion(){
  currentQ = null;
  renderQuizCard();
}
document.getElementById('quiz-tabs').querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.getElementById('quiz-tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentSubjectFilter = btn.dataset.tab;
    uiState.quizSubject = currentSubjectFilter;
    saveUiState();
    currentQ = null;
    renderQuizStats();
    renderQuizCard();
  });
});
document.getElementById('quiz-next-btn').addEventListener('click', nextQuestion);

// ---------- boot ----------
function boot(){
  loadUiState();
  loadTrackerState();
  loadQuizState();

  const today = todayMidnight();
  selectedKey = dkey(today.getFullYear(), today.getMonth()+1, today.getDate());

  currentCalMonth = uiState.calMonth || 7;
  document.getElementById('cal-tabs').querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', (b.dataset.tab==='cal-7') === (currentCalMonth===7));
  });

  currentSubjectFilter = uiState.quizSubject || 'all';
  document.getElementById('quiz-tabs').querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === currentSubjectFilter);
  });

  const resTab = uiState.resTab || 'res-folders';
  document.getElementById('res-tabs').querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === resTab);
  });
  document.querySelectorAll('#res-folders, #res-files').forEach(p=>p.classList.remove('active'));
  const resPanel = document.getElementById(resTab);
  if(resPanel) resPanel.classList.add('active');

  switchView(uiState.activeView || 'view-today');
  renderAll();
  renderQuizCard();
}

boot();
</script>
